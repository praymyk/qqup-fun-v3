<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[단독/역대급 최저가] 99% 타임세일 특가 모음 (선착순 마감 임박)</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            /* 다크모드 배경색 적용 */
            background-color: #121212; 
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            /* 컨테이너도 어두운 톤으로 변경 */
            background: #242424; 
            padding: 40px;
            border-radius: 15px;
            /* 그림자를 조금 더 진하게 설정 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            max-width: 500px;
            width: 100%;
        }
        img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 25px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        h2 {
            /* 어두운 배경에서 잘 보이도록 밝은 빨간색으로 변경 */
            color: #ff5252; 
            font-size: 1.5rem;
            margin-bottom: 15px;
            word-break: keep-all;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            /* 텍스트를 밝은 회색으로 변경 */
            color: #e0e0e0; 
            margin-bottom: 10px;
            word-break: keep-all;
        }
        .highlight {
            font-weight: bold;
            color: #ff5252;
            font-size: 1.2rem;
            margin-top: 20px;
        }
        .signature {
            margin-top: 40px;
            font-weight: bold;
            color: #9e9e9e;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="다운로드.jpeg" alt="삼국지 만우절 짤">
        
        <h2>그런 좋은 상품이 있을 줄 알고 설렜나요?</h2>
        <p>미안하지만 그런 일은 일어나지 않아요...</p>
        <p>잠시나마 요행을 바랐다면 깊이 반성하고<br>얼른 책상에 앉아 근무하기 바랍니다.</p>
        
        <p class="highlight">근무시간은 아직 끝나지도 않았어요.</p>

        <p class="signature">- 만우절을 그냥 보낼 수 없었던 밐쿠쓰가... -</p>
    </div>
</body>
</html>
